apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: airflow
  namespace: airflow-dev
spec:
  interval: 5m

  chart:
    spec:
      chart: airflow
      version: "1.21.0"
      sourceRef:
        kind: HelmRepository
        name: airflow
        namespace: kommander-flux

  values:
    executor: KubernetesExecutor

    webserver:
      service:
        type: ClusterIP

    postgres:
      enabled: true

    redis:
      enabled: true

